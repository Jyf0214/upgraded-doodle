name: Auto Merge (Dependabot & Owner)

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write       # 允许合并代码
  pull-requests: write  # 允许批准和评论 PR
  checks: read          # 读取检查状态

jobs:
  check-and-merge:
    runs-on: ubuntu-latest
    # 修改处：判断发起人是 dependabot 或者 Jyf0214
    if: ${{ github.actor == 'dependabot[bot]' || github.actor == 'Jyf0214' }}
    
    steps:
      # Step 1: 检出 PR 的源分支代码
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # Step 2: 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # Step 3: 安装 Hexo 和依赖
      - name: Install Hexo and dependencies
        run: |
          npm install -g hexo-cli
          npm install hexo-server hexo-browsersync hexo-renderer-pug --save
          npm install

      # Step 4: 验证本地构建 (hexo generate)
      - name: Test Build (Hexo Generate)
        run: hexo generate

      # Step 5: 批准 PR 并启用自动合并
      - name: Enable Auto-merge
        if: success() # 仅当本地构建成功时执行
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # 尝试批准 PR (如果是 Jyf0214 自己的 PR，这一步可能会提示无法批准自己的 PR，所以加了 || echo 跳过错误)
          gh pr review "$PR_URL" --approve --body "Automated build check passed. Ready for merge." || echo "Review skipped (possibly same user)"
          
          # 启用自动合并：等待 Vercel (需在仓库设置里设为 Required) 通过后合并
          gh pr merge "$PR_URL" --auto --merge
